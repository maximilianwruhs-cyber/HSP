name: ci
on: [push, pull_request]

jobs:
  linux-core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev libportaudio2 portaudio19-dev fluidsynth fluid-soundfont-gm
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -q
      - run: python scripts/midi_smoke.py
      - run: fluidsynth -a help
      - run: fluidsynth -m help
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path hsp-rs/Cargo.toml

  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run a11y:ci
