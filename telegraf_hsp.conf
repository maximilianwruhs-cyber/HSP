# Telegraf profile for HSP external ingest mode.
# Launch with:
#   telegraf --config ./telegraf_hsp.conf

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "1s"

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  fieldpass = ["usage_idle", "usage_iowait", "usage_active"]

[[inputs.mem]]
  fieldpass = ["used_percent"]

[[inputs.swap]]
  fieldpass = ["used_percent"]

[[inputs.system]]
  fieldpass = ["load1"]

# Optional: GPU metrics (requires NVIDIA drivers and nvidia-smi).
[[inputs.nvidia_smi]]
  timeout = "5s"

# Optional: Intel package power metrics.
[[inputs.intel_powerstat]]
  core_metrics = false

[[outputs.websocket]]
  url = "ws://127.0.0.1:8001/ingest"
  use_text_frames = true
  data_format = "json"
